apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: false
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        customQuery: true
        query: '{service_name=~".+"} |= "${__trace.traceId}"'

