apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: true
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
    correlations:
      - targetUID: loki
        label: View Logs
        description: Show related logs in Loki for this trace
        config:
          field: trace_id
          target:
            expr: '{filename=~"/logs/(producer|consumer)/.+"} |= "$${__value.raw}"'
