apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - name: trace_id
          type: text
          matcherRegex: trace_id=([a-f0-9]{32})
          url: '/a/grafana-exploretraces-app/explore?var-ds=tempo&traceId=$${__value.raw}'
          urlDisplayLabel: View Trace
          datasourceUid: tempo
    correlations:
      - targetUID: tempo
        label: View Trace
        description: Open related trace in Tempo
        config:
          field: trace_id
          target:
            expr: 'trace_id=$${__value.raw}'
