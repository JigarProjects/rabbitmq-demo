apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - name: trace_id
          type: text
          matcherRegex: _?trace_id=([a-f0-9]{32})
          url: '$${__value.raw}'
          urlDisplayLabel: View Trace
          datasourceUid: tempo

