services:

  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_LOGS: /var/log/rabbitmq/rabbitmq.log
    volumes:
      - ./logs/rabbitmq:/var/log/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-producer:
    build: python-producer
    container_name: python-producer
    ports:
      - "25001:25001"
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./logs/producer:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  go-consumer:
    build: go-consumer
    container_name: go-consumer
    environment:
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./logs/consumer:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
